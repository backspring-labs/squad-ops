services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: squadops-rabbitmq
    restart: unless-stopped
    ports:
    - 5672:5672
    - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: squadops
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}
    volumes:
    - rabbitmq_data:/var/lib/rabbitmq
    networks:
    - squadnet
    healthcheck:
      test:
      - CMD
      - rabbitmq-diagnostics
      - ping
      interval: 30s
      timeout: 10s
      retries: 5
  postgres:
    image: postgres:15
    container_name: squadops-postgres
    restart: unless-stopped
    ports:
    - 5432:5432
    environment:
      POSTGRES_DB: squadops
      POSTGRES_USER: squadops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    command:
    - postgres
    - -c
    - max_connections=200
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./infra/00-create-databases.sh:/docker-entrypoint-initdb.d/00-create-databases.sh
    - ./infra/01-init-tables.sh:/docker-entrypoint-initdb.d/01-init-tables.sh
    - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
    - squadnet
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U squadops -d squadops
      interval: 30s
      timeout: 10s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: squadops-redis
    restart: unless-stopped
    ports:
    - 6379:6379
    volumes:
    - redis_data:/data
    networks:
    - squadnet
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 30s
      timeout: 10s
      retries: 5
  prefect-server:
    image: prefecthq/prefect:2.14-python3.11
    container_name: squadops-prefect-server
    restart: unless-stopped
    ports:
    - 4200:4200
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: '4200'
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://squadops:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/squadops
      PREFECT_SERVER_ANALYTICS_ENABLED: 'false'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - squadnet
    command:
    - prefect
    - server
    - start
    - --host
    - 0.0.0.0
    - --port
    - '4200'
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')
      interval: 30s
      timeout: 10s
      retries: 5
  # SIP-0062: Keycloak OIDC Identity Provider
  # Uses the shared squadops-postgres instance (keycloak database).
  # LOCAL DEV / CI ONLY — hardcoded secrets below are NOT production-grade.
  squadops-keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: squadops-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123           # local dev only
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./infra/auth/squadops-realm.json:/opt/keycloak/data/import/squadops-realm-dev.json
      - ./infra/auth/squadops-realm-local.json:/opt/keycloak/data/import/squadops-realm-local.json
      - ./infra/auth/keycloak-theme/squadops:/opt/keycloak/themes/squadops:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - squadnet

  # SIP-0061: LangFuse LLM Observability
  # Uses the shared squadops-postgres instance (langfuse database).
  # LOCAL DEV / CI ONLY — hardcoded secrets below are NOT production-grade.
  langfuse:
    container_name: squadops-langfuse
    image: langfuse/langfuse:2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      NEXTAUTH_SECRET: mysecret            # local dev only
      NEXTAUTH_URL: http://localhost:3001
      SALT: mysalt                         # local dev only
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - squadnet

  runtime-api:  # SIP-0048: renamed from task-api
    build:
      context: .
      dockerfile: src/squadops/api/runtime/Dockerfile
      args:
        SOURCE_HASH: ${SOURCE_HASH:-unknown}
    container_name: squadops-runtime-api  # SIP-0048: renamed from squadops-task-api
    ports:
    - 8001:8001
    secrets:
      - db_password
      - rabbitmq_password
      - keycloak_admin_password
      - keycloak_db_dsn
    environment:
      POSTGRES_URL: postgresql://squadops:secret://db_password@postgres:5432/squadops
      RABBITMQ_URL: amqp://squadops:secret://rabbitmq_password@rabbitmq:5672/
      SQUADOPS_PROFILE: "${SQUADOPS_PROFILE:?Run bootstrap first}"
      SQUADOPS__SECRETS__PROVIDER: docker_secret
      SQUADOPS__DB__URL: postgresql://squadops:secret://db_password@postgres:5432/squadops
      SQUADOPS__COMMS__RABBITMQ__URL: amqp://squadops:secret://rabbitmq_password@rabbitmq:5672/
      SQUADOPS__COMMS__REDIS__URL: redis://redis:6379/0
      # Auth (SIP-0062)
      SQUADOPS__AUTH__ENABLED: "true"
      SQUADOPS__AUTH__PROVIDER: keycloak
      SQUADOPS__AUTH__OIDC__ISSUER_URL: http://squadops-keycloak:8080/realms/${SQUADOPS_REALM:-squadops-dev}
      SQUADOPS__AUTH__OIDC__ISSUER_PUBLIC_URL: http://${SQUADOPS_HOST:-localhost}:8180/realms/${SQUADOPS_REALM:-squadops-dev}
      SQUADOPS__AUTH__OIDC__AUDIENCE: squadops-runtime
      SQUADOPS__AUTH__EXPOSE_DOCS: "true"
      SQUADOPS__AUTH__CONSOLE__CLIENT_ID: squadops-console
      SQUADOPS__AUTH__CONSOLE__REDIRECT_URI: http://${SQUADOPS_HOST:-localhost}:4040/auth/callback
      SQUADOPS__AUTH__CONSOLE__POST_LOGOUT_REDIRECT_URI: http://${SQUADOPS_HOST:-localhost}:4040/
      # Cycle registry (SIP-Postgres-Cycle-Registry)
      SQUADOPS__CYCLES__REGISTRY_PROVIDER: postgres
      SQUADOPS__DB__MIGRATIONS_DIR: /app/infra/migrations
      # LangFuse (health probe)
      SQUADOPS__LANGFUSE__HOST: http://squadops-langfuse:3000
      # LLM (SIP-0066: cycle task handlers)
      SQUADOPS__LLM__MODEL: "llama3.1:8b"
    volumes:
      - ./data/artifacts:/app/data/artifacts
    networks:
    - squadnet
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  max:
    build:
      context: .
      dockerfile: agents/Dockerfile
      args:
        AGENT_ROLE: lead
        BUILD_HASH: ${BUILD_HASH:-unknown}
        SOURCE_HASH: ${SOURCE_HASH:-unknown}
    container_name: squadops-max
    restart: unless-stopped
    secrets:
      - db_password
      - rabbitmq_password
      - keycloak_admin_password
      - keycloak_db_dsn
    environment:
      SQUADOPS__AGENT__ID: max
      SQUADOPS_AGENT_ROLE: lead
      SQUADOPS_PROFILE: "${SQUADOPS_PROFILE:?Run bootstrap first}"
      SQUADOPS__SECRETS__PROVIDER: docker_secret
      SQUADOPS__DB__URL: postgresql://squadops:secret://db_password@postgres:5432/squadops
      SQUADOPS__COMMS__RABBITMQ__URL: amqp://squadops:secret://rabbitmq_password@rabbitmq:5672/
      SQUADOPS__COMMS__REDIS__URL: redis://redis:6379/0
      SQUADOPS__TELEMETRY__BACKEND: otel
      SQUADOPS__TELEMETRY__OTLP_ENDPOINT: http://otel-collector:4317
      SQUADOPS__LANGFUSE__ENABLED: "true"
      SQUADOPS__LANGFUSE__HOST: http://squadops-langfuse:3000
      SQUADOPS__LANGFUSE__PUBLIC_KEY: ${SQUADOPS__LANGFUSE__PUBLIC_KEY}
      SQUADOPS__LANGFUSE__SECRET_KEY: ${SQUADOPS__LANGFUSE__SECRET_KEY}
      # Prompt asset source (SIP-0084): 'filesystem' or 'langfuse'
      SQUADOPS__PROMPTS__ASSET_SOURCE_PROVIDER: ${SQUADOPS__PROMPTS__ASSET_SOURCE_PROVIDER:-filesystem}
      # Auth not needed for agents (no HTTP server)
      SQUADOPS__AUTH__ENABLED: "false"
    volumes:
      - max_memory_data:/app/data/memory_db
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - squadnet
    extra_hosts:
      - "host.docker.internal:host-gateway"
