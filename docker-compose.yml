services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: squadops-rabbitmq
    ports:
    - 5672:5672
    - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: squadops
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}
    volumes:
    - rabbitmq_data:/var/lib/rabbitmq
    networks:
    - squadnet
    healthcheck:
      test:
      - CMD
      - rabbitmq-diagnostics
      - ping
      interval: 30s
      timeout: 10s
      retries: 5
  postgres:
    image: postgres:15
    container_name: squadops-postgres
    ports:
    - 5432:5432
    environment:
      POSTGRES_DB: squadops
      POSTGRES_USER: squadops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    command:
    - postgres
    - -c
    - max_connections=200
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
    - squadnet
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U squadops -d squadops
      interval: 30s
      timeout: 10s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: squadops-redis
    ports:
    - 6379:6379
    volumes:
    - redis_data:/data
    networks:
    - squadnet
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 30s
      timeout: 10s
      retries: 5
  prefect-server:
    image: prefecthq/prefect:2.14-python3.11
    container_name: squadops-prefect-server
    ports:
    - 4200:4200
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: '4200'
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://squadops:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/squadops
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - squadnet
    command:
    - prefect
    - server
    - start
    - --host
    - 0.0.0.0
    - --port
    - '4200'
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')
      interval: 30s
      timeout: 10s
      retries: 5
  prefect-ui:
    image: prefecthq/prefect:2.14-python3.11
    container_name: squadops-prefect-ui
    ports:
    - 4201:4201
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    depends_on:
      prefect-server:
        condition: service_healthy
    networks:
    - squadnet
    command:
    - prefect
    - server
    - start
    - --host
    - 0.0.0.0
    - --port
    - '4201'
  health-check:
    build:
      context: .
      dockerfile: src/squadops/api/Dockerfile
    container_name: squadops-health-check
    ports:
    - 8000:8000
    secrets:
      - db_password
      - rabbitmq_password
    environment:
      # Legacy env vars (still used by some components)
      RABBITMQ_URL: amqp://squadops:secret://rabbitmq_password@rabbitmq:5672/
      POSTGRES_URL: postgresql://squadops:secret://db_password@postgres:5432/squadops
      REDIS_URL: redis://redis:6379
      PREFECT_URL: http://prefect-server:4200/api
      OTEL_COLLECTOR_VERSION: "0.138.0"  # Fallback if Docker API unavailable
      # New structured config (SIP-0.8.9)
      SQUADOPS_PROFILE: dev
      SQUADOPS__SECRETS__PROVIDER: docker_secret
      SQUADOPS__DB__URL: postgresql://squadops:secret://db_password@postgres:5432/squadops
      SQUADOPS__COMMS__RABBITMQ__URL: amqp://squadops:secret://rabbitmq_password@rabbitmq:5672/
      SQUADOPS__COMMS__REDIS__URL: redis://redis:6379/0
      SQUADOPS__TELEMETRY__BACKEND: otel
      SQUADOPS__TELEMETRY__OTLP_ENDPOINT: http://otel-collector:4317
      SQUADOPS__LANGFUSE__HOST: http://squadops-langfuse:3000
      # Auth (SIP-0062) - for Keycloak health check + console OIDC
      SQUADOPS__AUTH__ENABLED: "true"
      SQUADOPS__AUTH__PROVIDER: keycloak
      SQUADOPS__AUTH__OIDC__ISSUER_URL: http://squadops-keycloak:8080/realms/squadops
      SQUADOPS__AUTH__OIDC__ISSUER_PUBLIC_URL: http://localhost:8180/realms/squadops
      SQUADOPS__AUTH__OIDC__AUDIENCE: squadops-console
      SQUADOPS__AUTH__CONSOLE__CLIENT_ID: squadops-console
      SQUADOPS__AUTH__CONSOLE__REDIRECT_URI: http://localhost:8000/health
      SQUADOPS__AUTH__CONSOLE__POST_LOGOUT_REDIRECT_URI: http://localhost:8000/health
      SQUADOPS__RUNTIME_API_URL: http://localhost:8001
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - squadnet
    restart: unless-stopped
  runtime-api:  # SIP-0048: renamed from task-api
    build:
      context: .
      dockerfile: src/squadops/api/runtime/Dockerfile
    container_name: squadops-runtime-api  # SIP-0048: renamed from squadops-task-api
    ports:
    - 8001:8001
    secrets:
      - db_password
      - rabbitmq_password
    environment:
      POSTGRES_URL: postgresql://squadops:secret://db_password@postgres:5432/squadops
      RABBITMQ_URL: amqp://squadops:secret://rabbitmq_password@rabbitmq:5672/
      SQUADOPS_PROFILE: dev
      SQUADOPS__SECRETS__PROVIDER: docker_secret
      SQUADOPS__DB__URL: postgresql://squadops:secret://db_password@postgres:5432/squadops
      SQUADOPS__COMMS__RABBITMQ__URL: amqp://squadops:secret://rabbitmq_password@rabbitmq:5672/
      SQUADOPS__COMMS__REDIS__URL: redis://redis:6379/0
      # Auth (SIP-0062)
      SQUADOPS__AUTH__ENABLED: "true"
      SQUADOPS__AUTH__PROVIDER: keycloak
      SQUADOPS__AUTH__OIDC__ISSUER_URL: http://squadops-keycloak:8080/realms/squadops
      SQUADOPS__AUTH__OIDC__ISSUER_PUBLIC_URL: http://localhost:8180/realms/squadops
      SQUADOPS__AUTH__OIDC__AUDIENCE: squadops-runtime
      SQUADOPS__AUTH__EXPOSE_DOCS: "true"
      SQUADOPS__AUTH__CONSOLE__CLIENT_ID: squadops-console
      SQUADOPS__AUTH__CONSOLE__REDIRECT_URI: http://localhost:8000/health
      SQUADOPS__AUTH__CONSOLE__POST_LOGOUT_REDIRECT_URI: http://localhost:8000/health
    networks:
    - squadnet
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  
