  #   - squadnet
  #   restart: unless-stopped
  
  max:
    build:
      context: .
      dockerfile: agents/roles/lead/Dockerfile
      args:
        AGENT_ROLE: lead
        BUILD_HASH: ${BUILD_HASH:-unknown}
    container_name: squadops-max
    environment:
      AGENT_ID: max
      AGENT_ROLE: lead
      AGENT_DISPLAY_NAME: Max
      USE_LOCAL_LLM: "true"
      OLLAMA_URL: http://host.docker.internal:11434
      # Note: Mem0 1.0.0 may require OPENAI_API_KEY env var even when using Ollama
      # Per MEM0-LOCAL-EMBEDDINGS-GUIDE.md - guide may be for different Mem0 version
      RABBITMQ_URL: amqp://squadops:squadops123@rabbitmq:5672/
      POSTGRES_URL: postgresql://squadops:squadops123@postgres:5432/squadops
      REDIS_URL: redis://redis:6379
    volumes:
      - ./warm-boot:/app/warm-boot
      - max_memory_data:/app/data/memory_db
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - squadnet
  nat:
    build:
      context: .
      dockerfile: agents/roles/strat/Dockerfile
      args:
        AGENT_ROLE: strat
        BUILD_HASH: ${BUILD_HASH:-unknown}
    container_name: squadops-nat
    environment:
      AGENT_ID: nat
      AGENT_ROLE: strat
      AGENT_DISPLAY_NAME: Nat
      RABBITMQ_URL: amqp://squadops:squadops123@rabbitmq:5672/
      POSTGRES_URL: postgresql://squadops:squadops123@postgres:5432/squadops
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - squadnet
  glyph:
    build:
      context: .
      dockerfile: agents/roles/creative/Dockerfile
      args:
        AGENT_ROLE: creative
        BUILD_HASH: ${BUILD_HASH:-unknown}
    container_name: squadops-glyph
    environment:
      AGENT_ID: glyph
      AGENT_ROLE: creative
      AGENT_DISPLAY_NAME: Glyph
      RABBITMQ_URL: amqp://squadops:squadops123@rabbitmq:5672/
      POSTGRES_URL: postgresql://squadops:squadops123@postgres:5432/squadops
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - squadnet
  neo:
    build:
      context: .
      dockerfile: agents/roles/dev/Dockerfile
      args:
        AGENT_ROLE: dev
        BUILD_HASH: ${BUILD_HASH:-unknown}
    container_name: squadops-neo
    environment:
      AGENT_ID: neo
      AGENT_ROLE: dev
      AGENT_DISPLAY_NAME: Neo
      USE_LOCAL_LLM: "true"
      OLLAMA_URL: http://host.docker.internal:11434
      # Note: Mem0 1.0.0 may require OPENAI_API_KEY env var even when using Ollama
      # Per MEM0-LOCAL-EMBEDDINGS-GUIDE.md - guide may be for different Mem0 version
      RABBITMQ_URL: amqp://squadops:squadops123@rabbitmq:5672/
      POSTGRES_URL: postgresql://squadops:squadops123@postgres:5432/squadops
      REDIS_URL: redis://redis:6379
    volumes:
      - ./warm-boot:/app/warm-boot
      - ./docker-compose.yml:/app/docker-compose.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - neo_memory_data:/app/data/memory_db
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - squadnet
  eve:
    build:
      context: .
      dockerfile: agents/roles/qa/Dockerfile
      args:
        AGENT_ROLE: qa
        BUILD_HASH: ${BUILD_HASH:-unknown}
    container_name: squadops-eve
    environment:
      AGENT_ID: eve
      AGENT_ROLE: qa
      AGENT_DISPLAY_NAME: EVE
      USE_LOCAL_LLM: "true"
      OLLAMA_URL: http://host.docker.internal:11434
      RABBITMQ_URL: amqp://squadops:squadops123@rabbitmq:5672/
      POSTGRES_URL: postgresql://squadops:squadops123@postgres:5432/squadops
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - squadnet
  data:
    build:
      context: .
      dockerfile: agents/roles/data/Dockerfile
      args:
        AGENT_ROLE: data
        BUILD_HASH: ${BUILD_HASH:-unknown}
    container_name: squadops-data
    environment:
      AGENT_ID: data
      AGENT_ROLE: data
      AGENT_DISPLAY_NAME: Data
      USE_LOCAL_LLM: "true"
      OLLAMA_URL: http://host.docker.internal:11434
      RUNTIME_API_URL: http://runtime-api:8001  # SIP-0048: renamed from TASK_API_URL
      RABBITMQ_URL: amqp://squadops:squadops123@rabbitmq:5672/
      POSTGRES_URL: postgresql://squadops:squadops123@postgres:5432/squadops
      REDIS_URL: redis://redis:6379
    volumes:
      - ./warm-boot:/app/warm-boot
      - data_memory_data:/app/data/memory_db
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      runtime-api:  # SIP-0048: renamed from task-api
        condition: service_started
    networks:
    - squadnet
  quark:
    build:
      context: .
      dockerfile: agents/roles/finance/Dockerfile
      args:
        AGENT_ROLE: finance
        BUILD_HASH: ${BUILD_HASH:-unknown}
    container_name: squadops-quark
    environment:
      AGENT_ID: quark
      AGENT_ROLE: finance
      AGENT_DISPLAY_NAME: Quark
      RABBITMQ_URL: amqp://squadops:squadops123@rabbitmq:5672/
      POSTGRES_URL: postgresql://squadops:squadops123@postgres:5432/squadops
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - squadnet
  joi:
    build:
      context: .
      dockerfile: agents/roles/comms/Dockerfile
      args:
        AGENT_ROLE: comms
        BUILD_HASH: ${BUILD_HASH:-unknown}
    container_name: squadops-joi
    environment:
      AGENT_ID: joi
      AGENT_ROLE: comms
      AGENT_DISPLAY_NAME: Joi
      RABBITMQ_URL: amqp://squadops:squadops123@rabbitmq:5672/
      POSTGRES_URL: postgresql://squadops:squadops123@postgres:5432/squadops
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - squadnet
  og:
    build:
      context: .
      dockerfile: agents/roles/curator/Dockerfile
      args:
        AGENT_ROLE: curator
        BUILD_HASH: ${BUILD_HASH:-unknown}
    container_name: squadops-og
    environment:
      AGENT_ID: og
      AGENT_ROLE: curator
      AGENT_DISPLAY_NAME: Og
      RABBITMQ_URL: amqp://squadops:squadops123@rabbitmq:5672/
      POSTGRES_URL: postgresql://squadops:squadops123@postgres:5432/squadops
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - squadnet
  hal:
    build:
      context: .
      dockerfile: agents/roles/audit/Dockerfile
      args:
        AGENT_ROLE: audit
        BUILD_HASH: ${BUILD_HASH:-unknown}
    container_name: squadops-hal
    environment:
      AGENT_ID: hal
      AGENT_ROLE: audit
      AGENT_DISPLAY_NAME: HAL
      RABBITMQ_URL: amqp://squadops:squadops123@rabbitmq:5672/
      POSTGRES_URL: postgresql://squadops:squadops123@postgres:5432/squadops
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - squadnet
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: squadops-otel-collector
    command: ["--config=/etc/otel-collector/config.yaml"]
    environment:
      OTEL_COLLECTOR_VERSION: "0.138.0"  # Set version for health check
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otel-collector/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus metrics exporter
      - "13133:13133" # Health check extension
      - "55679:55679" # zPages extension (diagnostic pages with version info)
    depends_on:
      - prometheus
    networks:
      - squadnet
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:latest
    container_name: squadops-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - squadnet
    restart: unless-stopped
  grafana:
    image: grafana/grafana:latest
    container_name: squadops-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - squadnet
    restart: unless-stopped
volumes:
  rabbitmq_data: {}
  postgres_data: {}
  redis_data: {}
  prometheus_data: {}
  grafana_data: {}
  max_memory_data: {}
  neo_memory_data: {}
  data_memory_data: {}
networks:
  squadnet:
    driver: bridge
