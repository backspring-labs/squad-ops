  # SquadOps Console — Control-plane UI (SIP-Console-Control-Plane)
  # Internal-only: Caddy reverse proxy handles public port 4040
  squadops-console:
    build:
      context: .
      dockerfile: console/Dockerfile
      args:
        CONTINUUM_GIT_URL: ${CONTINUUM_GIT_URL:?Run scripts/dev/gen_console_env.sh first}
        CONTINUUM_REF: ${CONTINUUM_REF:?Run scripts/dev/gen_console_env.sh first}
    container_name: squadops-console
    # No public ports — Caddy reverse proxy handles :4040
    expose:
      - "4040"
    environment:
      SQUADOPS_API_URL: http://runtime-api:8001
      SQUADOPS_API_PUBLIC_URL: http://${SQUADOPS_HOST:-localhost}:8001
      PREFECT_API_URL: http://prefect-server:4200
      PREFECT_API_PUBLIC_URL: http://localhost:4200
      LANGFUSE_API_URL: http://squadops-langfuse:3000
      LANGFUSE_API_PUBLIC_URL: http://localhost:3001
      KEYCLOAK_URL: http://squadops-keycloak:8080/realms/${SQUADOPS_REALM:-squadops-dev}
      KEYCLOAK_PUBLIC_URL: http://${SQUADOPS_HOST:-localhost}:8180/realms/${SQUADOPS_REALM:-squadops-dev}
      CONSOLE_CLIENT_ID: squadops-console
      CONSOLE_REDIRECT_URI: http://${SQUADOPS_HOST:-localhost}:4040/auth/callback
      SERVICE_CLIENT_ID: squadops-console-service
      SERVICE_CLIENT_SECRET: ${CONSOLE_SERVICE_CLIENT_SECRET:-}
      REDIS_URL: redis://redis:6379/1
    env_file:
      - .env.console
    depends_on:
      runtime-api:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - squadnet
    restart: unless-stopped

  # Caddy reverse proxy — single-origin entry point (Phase 4)
  caddy:
    image: caddy:2-alpine
    container_name: squadops-caddy
    ports:
      - "4040:4040"
    volumes:
      - ./console/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      squadops-console:
        condition: service_started
    networks:
      - squadnet
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: squadops-otel-collector
    command: ["--config=/etc/otel-collector/config.yaml"]
    environment:
      OTEL_COLLECTOR_VERSION: "0.138.0"  # Set version for health check
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otel-collector/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus metrics exporter
      - "13133:13133" # Health check extension
      - "55679:55679" # zPages extension (diagnostic pages with version info)
    depends_on:
      - prometheus
    networks:
      - squadnet
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:latest
    container_name: squadops-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - squadnet
    restart: unless-stopped
  grafana:
    image: grafana/grafana:latest
    container_name: squadops-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - squadnet
    restart: unless-stopped
volumes:
  rabbitmq_data: {}
  postgres_data: {}
  redis_data: {}
  prometheus_data: {}
  grafana_data: {}
  max_memory_data: {}
  neo_memory_data: {}
  bob_memory_data: {}
  data_memory_data: {}
secrets:
  db_password:
    file: ./secrets/db_password.txt
  rabbitmq_password:
    file: ./secrets/rabbitmq_password.txt
  keycloak_admin_password:
    file: ./secrets/keycloak_admin_password.txt
  keycloak_db_dsn:
    file: ./secrets/keycloak_db_dsn.txt
networks:
  squadnet:
    driver: bridge
