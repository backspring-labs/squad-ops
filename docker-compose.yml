    networks:
      - squadnet

  # Health Check Service
  health-check:
    build:
      context: ./infra/health-check
      dockerfile: Dockerfile
    container_name: squadops-health-check
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_URL: amqp://squadops:squadops123@rabbitmq:5672/
      POSTGRES_URL: postgresql://squadops:squadops123@postgres:5432/squadops
      REDIS_URL: redis://redis:6379
      PREFECT_URL: http://prefect-server:4200/api
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prefect-server:
        condition: service_healthy
    networks:
      - squadnet

volumes:
  rabbitmq_data:
  postgres_data:
  redis_data:

networks:
  squadnet:
    driver: bridge
