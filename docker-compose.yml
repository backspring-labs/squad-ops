services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: squadops-rabbitmq
    ports:
    - 5672:5672
    - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: squadops
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}
    volumes:
    - rabbitmq_data:/var/lib/rabbitmq
    networks:
    - squadnet
    healthcheck:
      test:
      - CMD
      - rabbitmq-diagnostics
      - ping
      interval: 30s
      timeout: 10s
      retries: 5
  postgres:
    image: postgres:15
    container_name: squadops-postgres
    ports:
    - 5432:5432
    environment:
      POSTGRES_DB: squadops
      POSTGRES_USER: squadops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    command:
    - postgres
    - -c
    - max_connections=200
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
    - squadnet
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U squadops -d squadops
      interval: 30s
      timeout: 10s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: squadops-redis
    ports:
    - 6379:6379
    volumes:
    - redis_data:/data
    networks:
    - squadnet
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 30s
      timeout: 10s
      retries: 5
  prefect-server:
    image: prefecthq/prefect:2.14-python3.11
    container_name: squadops-prefect-server
    ports:
    - 4200:4200
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: '4200'
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://squadops:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/squadops
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - squadnet
    command:
    - prefect
    - server
    - start
    - --host
    - 0.0.0.0
    - --port
    - '4200'
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')
      interval: 30s
      timeout: 10s
      retries: 5
