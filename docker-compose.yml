  runtime-api:  # SIP-0048: renamed from task-api
    build:
      context: .
      dockerfile: src/squadops/api/runtime/Dockerfile
    container_name: squadops-runtime-api  # SIP-0048: renamed from squadops-task-api
    ports:
    - 8001:8001
    secrets:
      - db_password
      - rabbitmq_password
    environment:
      POSTGRES_URL: postgresql://squadops:secret://db_password@postgres:5432/squadops
      RABBITMQ_URL: amqp://squadops:secret://rabbitmq_password@rabbitmq:5672/
      SQUADOPS_PROFILE: dev
      SQUADOPS__SECRETS__PROVIDER: docker_secret
      SQUADOPS__DB__URL: postgresql://squadops:secret://db_password@postgres:5432/squadops
      SQUADOPS__COMMS__RABBITMQ__URL: amqp://squadops:secret://rabbitmq_password@rabbitmq:5672/
      SQUADOPS__COMMS__REDIS__URL: redis://redis:6379/0
      # Auth (SIP-0062)
      SQUADOPS__AUTH__ENABLED: "true"
      SQUADOPS__AUTH__PROVIDER: keycloak
      SQUADOPS__AUTH__OIDC__ISSUER_URL: http://squadops-keycloak:8080/realms/squadops-local
      SQUADOPS__AUTH__OIDC__ISSUER_PUBLIC_URL: http://localhost:8180/realms/squadops-local
      SQUADOPS__AUTH__OIDC__AUDIENCE: squadops-runtime
      SQUADOPS__AUTH__EXPOSE_DOCS: "true"
      SQUADOPS__AUTH__CONSOLE__CLIENT_ID: squadops-console
      SQUADOPS__AUTH__CONSOLE__REDIRECT_URI: http://localhost:4040/auth/callback
      SQUADOPS__AUTH__CONSOLE__POST_LOGOUT_REDIRECT_URI: http://localhost:4040/
      # Cycle registry (SIP-Postgres-Cycle-Registry)
      SQUADOPS__CYCLES__REGISTRY_PROVIDER: postgres
      SQUADOPS__DB__MIGRATIONS_DIR: /app/infra/migrations
      # LangFuse (health probe)
      SQUADOPS__LANGFUSE__HOST: http://squadops-langfuse:3000
      # LLM (SIP-0066: cycle task handlers)
      SQUADOPS__LLM__MODEL: "llama3.1:8b"
    volumes:
      - ./data/artifacts:/app/data/artifacts
    networks:
    - squadnet
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  
