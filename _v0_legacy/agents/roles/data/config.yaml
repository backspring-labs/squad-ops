agent_id: data
role: data
spec_version: 1.0.0
implements:
  - capability: data.collect_cycle_snapshot
    min_version: 1.0.0
  - capability: data.profile_cycle_metrics
    min_version: 1.0.0
  - capability: data.compose_cycle_summary
    min_version: 1.0.0
  - capability: comms.chat
    min_version: 1.0.0
constraints:
  repo_allow: ["squad_ops/*", "warm-boot/*"]
  max_runtime_s: 1800
  network_allow: ["git-read", "api-calls", "data-sources"]
defaults:
  model: ollama:qwen2.5:3b-instruct
  image: squadops/data:latest
  max_concurrency: 1

