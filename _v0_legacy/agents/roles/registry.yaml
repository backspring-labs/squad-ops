# SquadOps Role Registry
# Centralized definition of all agent roles
# Eliminates need for separate folders per role

roles:
  lead:
    display_name: "Task Lead"
    agent_type: "governance"
    reasoning_style: "governance"
    capabilities:
      - "task_coordination"
      - "approval_workflows"
      - "escalation_management"
      - "squad_governance"
      - "decision_making"
    task_types:
      - "approval_request"
      - "escalation"
      - "governance_decision"
      - "task_delegation"
      - "squad_coordination"
    metrics:
      approval_time: "avg_seconds"
      escalation_rate: "percentage"
      decision_accuracy: "percentage"
      squad_efficiency: "score"
    description: "Task Lead - Governance and coordination"

  strat:
    display_name: "Product Strategy"
    agent_type: "strategy"
    reasoning_style: "abductive"
    capabilities:
      - "market_analysis"
      - "product_planning"
      - "competitive_intelligence"
      - "roadmap_development"
      - "strategic_planning"
    task_types:
      - "market_research"
      - "product_strategy"
      - "competitive_analysis"
      - "roadmap_planning"
      - "strategic_decision"
    metrics:
      strategy_accuracy: "percentage"
      market_prediction: "score"
      competitive_position: "ranking"
      roadmap_adherence: "percentage"
    description: "Product Strategy - Abductive reasoning"

  dev:
    display_name: "Developer"
    agent_type: "developer"
    reasoning_style: "deductive"
    capabilities:
      - "code_generation"
      - "architecture_design"
      - "debugging"
      - "code_review"
      - "technical_documentation"
    task_types:
      - "code_development"
      - "bug_fix"
      - "architecture_design"
      - "code_review"
      - "documentation"
    metrics:
      code_quality: "score"
      bug_resolution_time: "avg_seconds"
      architecture_compliance: "percentage"
      documentation_coverage: "percentage"
    description: "Developer - Deductive reasoning"

  qa:
    display_name: "QA & Security"
    agent_type: "quality_assurance"
    reasoning_style: "counterfactual"
    capabilities:
      - "test_planning"
      - "security_auditing"
      - "quality_assurance"
      - "vulnerability_assessment"
      - "compliance_checking"
    task_types:
      - "test_execution"
      - "security_audit"
      - "quality_review"
      - "vulnerability_scan"
      - "compliance_check"
    metrics:
      test_coverage: "percentage"
      security_score: "rating"
      bug_detection_rate: "percentage"
      compliance_score: "percentage"
    description: "QA & Security - Counterfactual reasoning"

  data:
    display_name: "Analytics"
    agent_type: "data_analyst"
    reasoning_style: "inductive"
    capabilities:
      - "data_analysis"
      - "statistical_modeling"
      - "predictive_analytics"
      - "data_visualization"
      - "insight_generation"
    task_types:
      - "data_analysis"
      - "statistical_modeling"
      - "predictive_analytics"
      - "data_visualization"
      - "insight_report"
    metrics:
      analysis_accuracy: "percentage"
      model_performance: "score"
      insight_relevance: "rating"
      data_quality: "score"
    description: "Analytics - Inductive reasoning"

  finance:
    display_name: "Finance & Ops"
    agent_type: "financial_analyst"
    reasoning_style: "rule_based"
    capabilities:
      - "financial_analysis"
      - "budget_planning"
      - "cost_optimization"
      - "risk_assessment"
      - "operational_efficiency"
    task_types:
      - "financial_analysis"
      - "budget_planning"
      - "cost_optimization"
      - "risk_assessment"
      - "operational_review"
    metrics:
      budget_accuracy: "percentage"
      cost_savings: "dollar_amount"
      risk_score: "rating"
      operational_efficiency: "score"
    description: "Finance & Ops - Rule-based reasoning"

  comms:
    display_name: "Communications"
    agent_type: "communications"
    reasoning_style: "empathetic"
    capabilities:
      - "stakeholder_communication"
      - "documentation_writing"
      - "presentation_creation"
      - "team_coordination"
      - "information_dissemination"
    task_types:
      - "stakeholder_update"
      - "documentation"
      - "presentation"
      - "team_coordination"
      - "information_sharing"
    metrics:
      communication_clarity: "rating"
      stakeholder_satisfaction: "score"
      documentation_quality: "rating"
      team_coordination: "score"
    description: "Communications - Empathetic reasoning"

  curator:
    display_name: "R&D & Curation"
    agent_type: "research_curator"
    reasoning_style: "pattern_detection"
    capabilities:
      - "research_curation"
      - "knowledge_management"
      - "trend_analysis"
      - "content_organization"
      - "innovation_tracking"
    task_types:
      - "research_curation"
      - "knowledge_management"
      - "trend_analysis"
      - "content_organization"
      - "innovation_tracking"
    metrics:
      curation_quality: "rating"
      knowledge_coverage: "percentage"
      trend_accuracy: "score"
      innovation_detection: "rating"
    description: "R&D & Curation - Pattern detection"

  creative:
    display_name: "Creative Design"
    agent_type: "creative_designer"
    reasoning_style: "synthesis"
    capabilities:
      - "visual_design"
      - "creative_problem_solving"
      - "user_experience_design"
      - "brand_development"
      - "creative_strategy"
    task_types:
      - "visual_design"
      - "creative_solution"
      - "ux_design"
      - "brand_development"
      - "creative_strategy"
    metrics:
      design_quality: "rating"
      user_satisfaction: "score"
      brand_consistency: "rating"
      creative_innovation: "score"
    description: "Creative Design - Visual synthesis"

  audit:
    display_name: "Monitoring & Audit"
    agent_type: "auditor"
    reasoning_style: "continuous_monitoring"
    capabilities:
      - "system_monitoring"
      - "audit_execution"
      - "compliance_tracking"
      - "performance_analysis"
      - "risk_monitoring"
    task_types:
      - "system_monitoring"
      - "audit_execution"
      - "compliance_tracking"
      - "performance_analysis"
      - "risk_monitoring"
    metrics:
      monitoring_coverage: "percentage"
      audit_completeness: "percentage"
      compliance_score: "rating"
      risk_detection: "score"
    description: "Monitoring & Audit - Continuous monitoring"

  # NEW ROLE: DevOps Engineer
  devops:
    display_name: "DevOps Engineer"
    agent_type: "devops"
    reasoning_style: "systematic"
    capabilities:
      - "infrastructure_automation"
      - "deployment_pipeline"
      - "monitoring_setup"
      - "security_hardening"
      - "performance_optimization"
    task_types:
      - "infrastructure_setup"
      - "deployment_automation"
      - "monitoring_configuration"
      - "security_hardening"
      - "performance_tuning"
    metrics:
      deployment_success_rate: "percentage"
      infrastructure_uptime: "percentage"
      security_score: "rating"
      automation_coverage: "percentage"
    description: "DevOps Engineer - Infrastructure automation and deployment"

# Role templates and configurations
templates:
  agent_template: "agents/templates/agent_template.py"
  config_template: "agents/templates/config_template.py"
  dockerfile_template: "agents/templates/Dockerfile.template"
  requirements_template: "agents/templates/requirements.txt"

# Default configurations
defaults:
  version: "1.0.0"
  llm_model: "llama3-8b"
  config_version: "v1"
  deployment_date: "2024-10-03"
