agent_id: devops-agent
role: devops
spec_version: 1.0.0
implements:
  - capability: devops.infrastructure
    min_version: 1.0.0
  - capability: devops.deployment
    min_version: 1.0.0
constraints:
  repo_allow: ["squad_ops/*"]
  max_runtime_s: 1800
  network_allow: ["git-read", "docker-api", "infrastructure-api"]
defaults:
  model: ollama:llama3-8b
  image: squadops/devops:latest
  max_concurrency: 1

