agent_id: hal
role: audit
spec_version: 1.0.0
implements:
  - capability: audit.monitoring
    min_version: 1.0.0
  - capability: audit.compliance_tracking
    min_version: 1.0.0
constraints:
  repo_allow: ["squad_ops/*"]
  max_runtime_s: 3600
  network_allow: ["git-read", "monitoring-systems", "api-calls"]
defaults:
  model: ollama:llama3-8b
  image: squadops/hal:latest
  max_concurrency: 1

