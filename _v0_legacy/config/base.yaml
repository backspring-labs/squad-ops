# SquadOps Base Configuration
# Common settings shared across all environments
# Non-secret values only

# Database configuration
# URLs can be overridden via environment variables or profile files
# Default connection string format: postgresql://user:password@host:port/dbname

# Communication services
# URLs can be overridden via environment variables or profile files
# RabbitMQ: amqp://user:password@host:port/vhost
# Redis: redis://host:port/db

# Runtime API
runtime_api_url: "http://runtime-api:8001"

# Task management
tasks_backend: "prefect"

# Prefect orchestration
prefect:
  api_url: "http://prefect-server:4200/api"
  timeout: 30

# LLM configuration
llm:
  url: "http://host.docker.internal:11434"
  use_local: true
  timeout: 60

# Agent configuration
agent:
  id: "unknown_agent"
  role: "unknown"
  instances_file: "agents/instances/instances.yaml"
  heartbeat_timeout_window: 90
  reconciliation_interval: 45

# Cycle data storage
cycle_data:
  root: "cycle_data"

# Telemetry configuration
telemetry:
  prometheus_port: 8888

# Observability service URLs
observability:
  prometheus:
    url: "http://prometheus:9090"
  grafana:
    url: "http://grafana:3000"
  otel:
    url: "http://otel-collector:4318"
    health_url: "http://otel-collector:13133"
    zpages_url: "http://otel-collector:55679"

# Deployment tooling
deployment:
  file_manager:
    allowed_extensions: [".md", ".py", ".js", ".html", ".css", ".json", ".yaml", ".yml"]
    max_file_size: 10485760
  docker:
    network_name: "squad-ops_squadnet"
    default_port: 8080
    restart_policy: "unless-stopped"
  warm_boot_dir: "/app/warm-boot"

