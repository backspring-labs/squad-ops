# Development Environment Profile
# Development service URLs and test-friendly settings

secrets:
  provider: env
  env_prefix: SQUADOPS_

db:
  url: "postgresql://squadops:secret://db_password@postgres:5432/squadops"
  pool_size: 8

comms:
  rabbitmq:
    url: "amqp://squadops:secret://rabbitmq_password@rabbitmq:5672/"
    host: "rabbitmq"
  redis:
    url: "redis://redis:6379/0"
    host: "redis"

runtime_api_url: "http://runtime-api:8001"

llm:
  url: "http://host.docker.internal:11434"

cycle_data:
  root: "cycle_data"

