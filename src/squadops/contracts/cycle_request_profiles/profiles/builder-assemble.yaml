name: builder-assemble
description: Plan-then-build cycle using dedicated builder agent for assembly.
defaults:
  build_strategy: fresh
  build_profile: python_cli_builder
  task_flow_policy:
    mode: sequential
    gates:
      - name: plan-review
        description: Review planning artifacts before build begins.
        after_task_types:
          - governance.review
  expected_artifact_types:
    - document
    - source
    - test
    - config
    - qa_handoff
  build_tasks:
    - development.develop
    - builder.assemble
    - qa.test
  experiment_context: {}
  notes: "Plan-then-build with dedicated builder agent (SIP-0071)"
