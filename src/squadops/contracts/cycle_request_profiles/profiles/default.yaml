name: default
description: Standard defaults for cycle creation.
defaults:
  build_strategy: fresh
  task_flow_policy:
    mode: sequential
    gates: []
  expected_artifact_types:
    - code
    - test_report
  execution_overrides: {}
  experiment_context: {}
prompts:
  build_strategy:
    label: Build Strategy
    help_text: "How to build artifacts: fresh (from scratch) or incremental (delta)."
    choices:
      - fresh
      - incremental
  notes:
    label: Cycle Notes
    help_text: Optional notes describing the experiment intent.
