name: build
description: Plan-then-build cycle with gate between planning and implementation workloads.
defaults:
  build_strategy: fresh
  task_flow_policy:
    mode: sequential
    gates:
      - name: progress_plan_review
        description: Review planning artifacts and build manifest before implementation begins.
        after_task_types:
          - governance.review
  expected_artifact_types:
    - document
    - source
    - test
    - config
  workload_sequence:
    - type: planning
      gate: progress_plan_review
    - type: implementation
      gate: null
  build_tasks: true
  build_manifest: true
  output_validation: true
  max_self_eval_passes: 1
  max_build_subtasks: 12
  experiment_context: {}
  notes: "Plan-then-build cycle with manifest decomposition (SIP-0086)"
