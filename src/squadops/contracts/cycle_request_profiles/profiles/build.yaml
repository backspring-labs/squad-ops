name: build
description: Plan-then-build cycle with optional gate between plan and build phases.
defaults:
  build_strategy: fresh
  task_flow_policy:
    mode: sequential
    gates:
      - name: plan-review
        description: Review planning artifacts before build begins.
        after_task_types:
          - governance.review
  expected_artifact_types:
    - document
    - source
    - test
    - config
  build_tasks:
    - development.develop
    - qa.test
  build_manifest: true
  output_validation: true
  max_self_eval_passes: 1
  max_build_subtasks: 12
  experiment_context: {}
  notes: "Plan-then-build cycle"
