# Reference example — not a required executor topology.
# Single-workload cycles and alternative workload sequences remain valid.
name: multi-phase
description: "Planning → Implementation → Wrap-up multi-workload cycle"
defaults:
  squad_profile_id: full-squad
  build_strategy: fresh
  task_flow_policy:
    mode: sequential
    gates:
      - name: progress_plan_review
        description: "Human reviews plan before implementation"
        after_task_types:
          - governance.task_plan
      - name: progress_impl_review
        description: "Human reviews implementation before wrap-up"
        after_task_types: []
  workload_sequence:
    - type: planning
      gate: progress_plan_review
    - type: implementation
      gate: progress_impl_review
    - type: wrapup
      gate: null
