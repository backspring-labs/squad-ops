name: group_run
description: >
  Cycle request profile for the Group Run sample project.
  Builds a full-stack web app (FastAPI + React) for coordinating group runs.
  Uses the build profile for plan-then-build execution.
defaults:
  build_strategy: fresh
  dev_capability: fullstack_fastapi_react
  build_profile: fullstack_fastapi_react
  task_flow_policy:
    mode: sequential
    gates:
      - name: plan-review
        description: >
          Review planning artifacts before building the running logger.
        after_task_types:
          - governance.review
  expected_artifact_types:
    - document
    - source
    - test
    - config
  build_tasks:
    - development.develop
    - builder.assemble
    - qa.test
  experiment_context:
    sample_app: group_run
  notes: "Group Run — multi-module build-capable sample project"
