name: group_run
description: >
  Cycle request profile for the Group Run sample project.
  Builds a multi-module CLI running activity logger with data persistence.
  Uses the build profile for plan-then-build execution.
defaults:
  build_strategy: fresh
  task_flow_policy:
    mode: sequential
    gates:
      - name: plan-review
        description: >
          Review planning artifacts before building the running logger.
        after_task_types:
          - governance.review
  expected_artifact_types:
    - documentation
    - source
    - test
    - config
  build_tasks:
    - development.build
    - qa.build_validate
  experiment_context:
    sample_app: group_run
  notes: "Group Run — multi-module build-capable sample project"
