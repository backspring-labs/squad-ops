name: group_run
description: >
  Scaffold-only cycle request profile for group_run.
  Uses the fullstack pipeline with prd-scaffold.md to validate
  stack-aware development capabilities before attempting full scope.
defaults:
  build_strategy: fresh
  dev_capability: fullstack_fastapi_react
  build_profile: fullstack_fastapi_react
  task_flow_policy:
    mode: sequential
    gates:
      - name: plan-review
        description: >
          Review planning artifacts before building the fullstack scaffold.
        after_task_types:
          - governance.review
  expected_artifact_types:
    - document
    - source
    - test
    - config
  build_tasks:
    - development.develop
    - builder.assemble
    - qa.test
  experiment_context:
    sample_app: group_run
    prd: prd-scaffold.md
  notes: "group_run scaffold — fullstack pipeline validation"
