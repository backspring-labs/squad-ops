catalog_version: 1.0.0
skills:
  # Dev role skills (prompt-based reasoning patterns)
  - name: dev.architect_prompt
    skill_version: 1.0.0
    description: "Architecture reasoning pattern for generating build manifests"
    owner: "Neo"
    inputs:
      - app_name: "Application name"
      - version: "Application version"
      - prd_analysis: "PRD analysis content"
      - features: "List of features"
      - constraints: "Build constraints"
      - output_format: "Output format (json or delimited)"
    outputs:
      - prompt: "Formatted prompt string for LLM"
    determinism: "Deterministic - template substitution only"
    
  - name: dev.developer_prompt
    skill_version: 1.0.0
    description: "Developer reasoning pattern for generating application files"
    owner: "Neo"
    inputs:
      - app_name: "Application name"
      - app_name_kebab: "Application name in kebab-case"
      - version: "Application version"
      - run_id: "Run identifier"
      - prd_analysis: "PRD analysis content"
      - features: "List of features"
      - constraints: "Build constraints"
      - manifest_summary: "Architecture manifest summary"
      - output_format: "Output format (json or delimited)"
    outputs:
      - prompt: "Formatted prompt string for LLM"
    determinism: "Deterministic - template substitution only"
    
  - name: dev.squadops_constraints
    skill_version: 1.0.0
    description: "SquadOps platform constraints and requirements"
    owner: "Neo"
    inputs:
      - version: "Application version"
      - run_id: "Run identifier"
      - app_name_kebab: "Application name in kebab-case"
    outputs:
      - constraints: "Formatted constraints string"
    determinism: "Deterministic - template substitution only"
    
  # Lead role skills (prompt-based reasoning patterns)
  - name: lead.prd_analysis_prompt
    skill_version: 1.0.0
    description: "PRD analysis reasoning pattern for extracting requirements"
    owner: "Max"
    inputs:
      - agent_role: "Role of the agent performing the analysis"
      - prd_content: "PRD content to analyze"
    outputs:
      - prompt: "Formatted prompt string for LLM"
    determinism: "Deterministic - template substitution only"
    
  - name: lead.build_requirements_prompt
    skill_version: 1.0.0
    description: "Build requirements reasoning pattern for generating development requirements"
    owner: "Max"
    inputs:
      - app_name: "Application name"
      - version: "Application version"
      - run_id: "Run identifier"
      - features: "List of features"
      - prd_content: "PRD content to analyze"
    outputs:
      - prompt: "Formatted prompt string for LLM"
    determinism: "Deterministic - template substitution only"
    
  # Product domain skills
  - name: product.format_prd_prompt
    skill_version: 1.0.0
    description: "Format prompt for LLM to generate PRD content from requirement/objective using template"
    domain: product
    inputs:
      - requirement: "User requirement/request"
      - objective: "Objective or goal for the application"
      - app_name: "Application name"
      - template_content: "PRD template content with placeholders"
    outputs:
      - prompt: "Formatted prompt string for LLM"
    determinism: "Deterministic - prompt formatting only"
    
  - name: product.parse_prd_acceptance_criteria
    skill_version: 1.0.0
    description: "Extract acceptance criteria from PRD content"
    domain: product
    inputs:
      - prd_content: "PRD markdown content"
    outputs:
      - criteria: "Structured list with criterion_id, description, type, testable"
    determinism: "Deterministic - parsing logic only"
    
  # QA domain skills
  - name: qa.compare_app_output_to_criteria
    skill_version: 1.0.0
    description: "Fetch deployed app HTML, parse content, and compare against acceptance criteria"
    domain: qa
    inputs:
      - app_url: "URL of deployed application"
      - criteria_list: "List of criteria dictionaries"
    outputs:
      - comparison_results: "Dictionary with criteria_met, criteria_unmet, criteria_partial"
    determinism: "Non-deterministic - requires HTTP fetch"
    
  # Shared skills
  - name: shared.text_match
    skill_version: 1.0.0
    description: "Semantic text matching for criteria validation"
    domain: shared
    inputs:
      - text: "Text to search in"
      - pattern: "Pattern to match against"
      - threshold: "Minimum similarity score (0.0-1.0)"
    outputs:
      - match_score: "Float similarity score (0.0-1.0)"
      - matched: "Boolean indicating if score > threshold"
    determinism: "Deterministic - text processing only"

