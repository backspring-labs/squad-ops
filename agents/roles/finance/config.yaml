agent_id: quark
role: finance
spec_version: 1.0.0
implements:
  - capability: finance.analysis
    min_version: 1.0.0
  - capability: finance.budget_planning
    min_version: 1.0.0
constraints:
  repo_allow: ["squad_ops/*"]
  max_runtime_s: 1200
  network_allow: ["git-read", "api-calls"]
defaults:
  model: ollama:llama3-8b
  image: squadops/quark:latest
  max_concurrency: 1

