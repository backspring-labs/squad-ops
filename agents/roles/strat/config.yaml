agent_id: nat
role: strat
spec_version: 1.0.0
implements:
  - capability: strategy.market_analysis
    min_version: 1.0.0
  - capability: strategy.product_planning
    min_version: 1.0.0
constraints:
  repo_allow: ["squad_ops/*"]
  max_runtime_s: 1800
  network_allow: ["git-read", "api-calls"]
defaults:
  model: ollama:mixtral-8x7b
  image: squadops/nat:latest
  max_concurrency: 1

