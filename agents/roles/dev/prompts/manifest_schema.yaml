# BuildManifest Schema Definition
# This defines the contract between Architect and Developer

architecture:
  type: string  # spa_web_app, api_service, multi_page_app, etc.
  description: "Application architecture pattern"

files:
  - path: string  # File path relative to app root
    purpose: string  # What this file does
    dependencies: array[string]  # Other files this depends on

deployment:
  container: string  # Docker container image
  port: integer  # Container port
  additional: object  # Optional deployment config
