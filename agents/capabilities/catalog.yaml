catalog_version: 1.0.0
capabilities:
  # Development capabilities
  - name: build.artifact
    capability_version: 1.0.0
    description: "Build application artifacts from specifications"
    result:
      keys:
        - artifact_uri
        - commit
        - files_generated
        - manifest_uri
  
  - name: test.run
    capability_version: 1.0.0
    description: "Execute test suite and generate reports"
    result:
      keys:
        - passed
        - failed
        - report_uri
        - coverage_percentage
  
  - name: validate.warmboot
    capability_version: 1.0.0
    description: "Validate WarmBoot execution and generate wrap-up"
    result:
      keys:
        - match
        - diffs
        - wrap_up_uri
        - metrics
  
  # Governance capabilities
  - name: governance.task_coordination
    capability_version: 1.0.0
    description: "Coordinate and delegate tasks across squad"
    result:
      keys:
        - tasks_created
        - tasks_delegated
        - coordination_log
  
  - name: governance.approval
    capability_version: 1.0.0
    description: "Process approval requests and decisions"
    result:
      keys:
        - approved
        - decision
        - approval_time
  
  - name: governance.escalation
    capability_version: 1.0.0
    description: "Handle escalation requests"
    result:
      keys:
        - escalated
        - resolution
        - escalation_time
  
  # QA capabilities
  - name: qa.test_design
    capability_version: 1.0.0
    description: "Design test plans and test cases from requirements/PRDs"
    result:
      keys:
        - test_plan_uri
        - test_cases
        - coverage_analysis
        - test_scenarios
  
  - name: qa.test_dev
    capability_version: 1.0.0
    description: "Develop test code/scripts from test plans"
    result:
      keys:
        - test_files_uri
        - test_code
        - fixtures_uri
        - test_framework
  
  - name: qa.test_execution
    capability_version: 1.0.0
    description: "Execute test suites and generate reports"
    result:
      keys:
        - passed
        - failed
        - report_uri
        - coverage_percentage
        - execution_log
  
  # Data capabilities
  - name: data.analysis
    capability_version: 1.0.0
    description: "Perform data analysis and generate insights"
    result:
      keys:
        - insights
        - metrics
        - visualization_uri
  
  - name: data.modeling
    capability_version: 1.0.0
    description: "Create statistical models and predictions"
    result:
      keys:
        - model_uri
        - accuracy
        - predictions
  
  - name: data.collect_cycle_snapshot
    capability_version: 1.0.0
    description: "Collect and normalize execution cycle snapshot from Task API and warmboot artifacts"
    result:
      keys:
        - snapshot_path
        - cycle_id  # SIP-0048: renamed from ecid
        - task_count
        - agent_count
  
  - name: data.profile_cycle_metrics
    capability_version: 1.0.0
    description: "Compute metrics from cycle snapshot and generate JSON + Markdown reports"
    result:
      keys:
        - metrics_json_path
        - metrics_md_path
        - cycle_id  # SIP-0048: renamed from ecid
        - metrics_summary
  
  - name: data.compose_cycle_summary
    capability_version: 1.0.0
    description: "Compose compact JSON summary with health flags and timeline"
    result:
      keys:
        - summary_path
        - cycle_id  # SIP-0048: renamed from ecid
        - health
        - agent_summary
  
  # Finance capabilities
  - name: finance.analysis
    capability_version: 1.0.0
    description: "Perform financial analysis and reporting"
    result:
      keys:
        - financial_report
        - cost_breakdown
        - recommendations
  
  - name: finance.budget_planning
    capability_version: 1.0.0
    description: "Create budget plans and forecasts"
    result:
      keys:
        - budget_plan
        - forecast
        - cost_optimization
  
  # Communications capabilities
  - name: comms.documentation
    capability_version: 1.0.0
    description: "Create documentation and written content"
    result:
      keys:
        - documentation_uri
        - content
        - format
  
  - name: comms.stakeholder_update
    capability_version: 1.0.0
    description: "Generate stakeholder updates and communications"
    result:
      keys:
        - update_content
        - recipients
        - delivery_status
  
  - name: comms.chat
    capability_version: 1.0.0
    description: "Handle interactive chat messages from console"
    result:
      keys:
        - response_text
        - agent_name
        - timestamp
        - status
  
  # Research capabilities
  - name: research.curation
    capability_version: 1.0.0
    description: "Curate research content and knowledge"
    result:
      keys:
        - curated_content
        - knowledge_base_uri
        - insights
  
  - name: research.trend_analysis
    capability_version: 1.0.0
    description: "Analyze trends and patterns"
    result:
      keys:
        - trends
        - patterns
        - predictions
  
  # Creative capabilities
  - name: creative.visual_design
    capability_version: 1.0.0
    description: "Create visual designs and assets"
    result:
      keys:
        - design_uri
        - assets
        - style_guide
  
  - name: creative.ux_design
    capability_version: 1.0.0
    description: "Design user experience and interfaces"
    result:
      keys:
        - ux_design_uri
        - wireframes
        - user_flows
  
  # Audit capabilities
  - name: audit.monitoring
    capability_version: 1.0.0
    description: "Monitor system health and performance"
    result:
      keys:
        - health_status
        - metrics
        - alerts
  
  - name: audit.compliance_tracking
    capability_version: 1.0.0
    description: "Track compliance and audit trails"
    result:
      keys:
        - compliance_status
        - audit_trail
        - violations
  
  # DevOps capabilities
  - name: devops.infrastructure
    capability_version: 1.0.0
    description: "Manage infrastructure and deployment"
    result:
      keys:
        - infrastructure_status
        - deployment_uri
        - configuration
  
  - name: devops.deployment
    capability_version: 1.0.0
    description: "Execute deployments and releases"
    result:
      keys:
        - deployment_status
        - deployment_uri
        - version
  
  # PRD capabilities
  - name: prd.read
    capability_version: 1.0.0
    description: "Read and parse PRD files"
    result:
      keys:
        - prd_content
        - file_path
        - parsed_sections
  
  - name: prd.analyze
    capability_version: 1.0.0
    description: "Analyze PRD and extract requirements"
    result:
      keys:
        - core_features
        - technical_requirements
        - success_criteria
        - analysis_summary
  
  - name: prd.process
    capability_version: 1.0.0
    description: "Process PRD - orchestrates reading, analysis, task creation, and delegation"
    result:
      keys:
        - status
        - message
        - prd_path
        - tasks_delegated
        - prd_analysis
  
  - name: product.draft_prd_from_prompt
    capability_version: 1.0.0
    description: "Draft PRD from requirement/objective prompt using template structure"
    result:
      keys:
        - prd_content
        - prd_path
        - sections_generated
  
  - name: product.validate_acceptance_criteria
    capability_version: 1.0.0
    description: "Validate PRD acceptance criteria against deployed application"
    result:
      keys:
        - criteria_met
        - criteria_unmet
        - criteria_partial
        - validation_score
        - details
  
  # Telemetry capabilities
  - name: telemetry.collect
    capability_version: 1.0.0
    description: "Collect comprehensive telemetry data"
    result:
      keys:
        - database_metrics
        - rabbitmq_metrics
        - docker_events
        - reasoning_logs
        - system_metrics
        - artifact_hashes
        - event_timeline
        - execution_duration
  
  # Task delegation capabilities
  - name: task.delegate
    capability_version: 1.0.0
    description: "Delegate tasks to other agents"
    result:
      keys:
        - task_id
        - target_agent
        - delegation_status
        - delegation_time
  
  - name: task.determine_target
    capability_version: 1.0.0
    description: "Determine which agent should handle a task"
    result:
      keys:
        - target_agent
        - target_role
        - reasoning
  
  - name: task.create
    capability_version: 1.0.0
    description: "Create development tasks from PRD analysis"
    result:
      keys:
        - tasks
        - app_name
        - app_version
        - task_count
  
  # Build capabilities
  - name: build.requirements.generate
    capability_version: 1.0.0
    description: "Generate build requirements from PRD content"
    result:
      keys:
        - app_name
        - version
        - run_id
        - prd_analysis
        - features
        - constraints
        - success_criteria
  
  # Task completion capabilities
  - name: task.completion.handle
    capability_version: 1.0.0
    description: "Handle task completion events and orchestrate next steps"
    result:
      keys:
        - handled
        - next_action
        - completion_status
  
  # WarmBoot capabilities
  - name: warmboot.wrapup
    capability_version: 1.0.0
    description: "Generate WarmBoot wrap-up reports"
    result:
      keys:
        - wrapup_uri
        - wrapup_content
        - telemetry_data
        - run_number
  
  - name: warmboot.memory
    capability_version: 1.0.0
    description: "Load and manage WarmBoot memories and governance logging"
    result:
      keys:
        - memories_loaded
        - governance_logged
        - memory_count

