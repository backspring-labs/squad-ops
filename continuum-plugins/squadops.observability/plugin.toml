[plugin]
id = "squadops.observability"
name = "Observability"
version = "0.1.0"
description = "Prefect flow metrics, LangFuse LLM traces, and cost summary."
required = false

[plugin.ui]
tag_prefix = "squadops-obs"
bundle = "plugin.js"

# No nav entry, no commands — view-only observability panels

[[contributions.panel]]
slot = "ui.slot.main"
perspective = "signal"
component = "squadops-obs-flow-metrics"
priority = 200

[[contributions.panel]]
slot = "ui.slot.main"
perspective = "signal"
component = "squadops-obs-llm-traces"
priority = 100

[[contributions.panel]]
slot = "ui.slot.right_rail"
perspective = "signal"
component = "squadops-obs-cost-summary"
priority = 300
