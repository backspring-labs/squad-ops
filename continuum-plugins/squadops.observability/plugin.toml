[plugin]
id = "squadops.observability"
name = "Observability"
version = "0.1.0"
description = "Build artifacts, gate decisions, and cycle stats."
required = false

[plugin.ui]
tag_prefix = "squadops-obs"
bundle = "plugin.js"

# No nav entry, no commands — view-only observability panels

[[contributions.panel]]
slot = "ui.slot.main"
perspective = "signal"
component = "squadops-obs-artifacts"
priority = 200

[[contributions.panel]]
slot = "ui.slot.main"
perspective = "signal"
component = "squadops-obs-gate-decisions"
priority = 100

[[contributions.panel]]
slot = "ui.slot.right_rail"
perspective = "signal"
component = "squadops-obs-cycle-stats"
priority = 300
