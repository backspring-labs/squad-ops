server {
    listen 80;
    server_name localhost;
    
    # Serve the application from /hello-squad/ path
    location /hello-squad/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /hello-squad/index.html;
    }
    
    # Handle static assets - strip /hello-squad/ prefix and serve from root
    location ~* ^/hello-squad/(.+\.(css|js|png|jpg|jpeg|gif|ico|svg))$ {
        alias /usr/share/nginx/html/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Default location - redirect to hello-squad
    location / {
        return 301 /hello-squad/;
    }
}
