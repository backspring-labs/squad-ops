server {
    listen 80;
    server_name localhost;

    location /hello-squad/ {
        alias /path/to/app/;
        try_files $uri $uri/ =404;
        location ~* \.(js|css|png|jpg|gif|ico)$ {
            expires max;
            log_not_found off;
        }
    }

    location / {
        return 301 /hello-squad/;
    }
}