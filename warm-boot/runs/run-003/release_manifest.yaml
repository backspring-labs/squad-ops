## Configuration

### Environment Variables
```yaml
# HelloSquad Application
APP_VERSION: "1.1.0"
WARMBOOT_RUN_ID: "run-003"
BUILD_TIMESTAMP: "2025-10-05T01:20:55Z"
GIT_HASH: "63309af"
PORT: 3000
NODE_ENV: "production"

# Agent Configuration
USE_LOCAL_LLM: "true"
OLLAMA_URL: "http://host.docker.internal:11434"
AGENT_ID: "max" # or "neo"
AGENT_ROLE: "lead" # or "dev"
```

### Docker Services
- **hello-squad:** Port 3000, depends on RabbitMQ, Postgres, Redis
- **max:** LeadAgent with local LLM integration
- **neo:** DevAgent with local LLM integration
- **rabbitmq:** Message broker for agent communication
- **postgres:** Task tracking and status storage
- **redis:** Caching and pub/sub
- **health-check:** Monitoring and status dashboard

## Deployment Details

### Build Process
1. **Docker Build:** Rebuilt hello-squad with run-003 parameters
2. **Agent Communication:** Max sent task to Neo via RabbitMQ
3. **Task Processing:** Neo processed task with real LLM
4. **Implementation:** Footer updated to show run-003
5. **Deployment:** Application redeployed and accessible

### Verification
- **API Endpoint:** `/api/version` returns run-003
- **Frontend:** Footer displays "WarmBoot: run-003"
- **Agent Communication:** RabbitMQ messages confirmed
- **Database:** Task status tracked in PostgreSQL

