## Deployment Commands

```bash
# Deploy run-002
git checkout v0.2-warmboot-002
docker compose build hello-squad \
  --build-arg APP_VERSION=1.1.0 \
  --build-arg WARMBOOT_RUN_ID=run-002 \
  --build-arg BUILD_TIMESTAMP=2025-10-05T01:03:58Z \
  --build-arg GIT_HASH=3b4c483
docker compose up -d hello-squad

# Verify deployment
curl http://localhost:3000/api/version
curl http://localhost:3000/
```

## Rollback Commands

```bash
# Rollback to run-001
git checkout v0.1-warmboot-001
docker compose down hello-squad
docker compose up -d hello-squad
```

