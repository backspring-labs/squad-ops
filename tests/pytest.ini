[tool:pytest]
# Pytest configuration for SquadOps test harness

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    regression: Regression tests for critical workflows
    performance: Performance and load tests
    slow: Slow running tests
    database: Tests that require database
    rabbitmq: Tests that require RabbitMQ
    redis: Tests that require Redis

# Test execution
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10

# Coverage configuration
[coverage:run]
source = agents
include = 
    agents/*
    config/*
    infra/runtime-api/*  # SIP-0048: renamed from task-api
    infra/health-check/*
omit = 
    */tests/*
    */venv/*
    */env/*
    */__pycache__/*
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = tests/htmlcov
