# SquadOps Default Configuration
# Minimal safe defaults for all services
# Part of the "defaults tier" - applied after built-in defaults in schema.py

db:
  url: "postgresql://squadops:squadops123@postgres:5432/squadops"
  pool_size: 5
  max_overflow: 10
  pool_timeout: 30
  echo: false

comms:
  rabbitmq:
    url: "amqp://squadops:squadops123@rabbitmq:5672/"
    host: rabbitmq
    port: 5672
    user: squadops
    vhost: "/"
  redis:
    url: "redis://redis:6379/0"
    host: redis
    port: 6379
    db: 0

runtime_api_url: "http://runtime-api:8001"

tasks_backend: "prefect"

prefect:
  api_url: "http://prefect-server:4200/api"
  timeout: 30

llm:
  url: "http://host.docker.internal:11434"
  use_local: true
  timeout: 60

agent:
  id: "unknown_agent"
  role: "unknown"
  instances_file: "agents/instances/instances.yaml"
  heartbeat_timeout_window: 90
  reconciliation_interval: 45

cycle_data:
  root: "cycle_data"

# Telemetry configuration
telemetry:
  prometheus_port: 8888

# Observability service URLs
observability:
  prometheus:
    url: "http://prometheus:9090"
  grafana:
    url: "http://grafana:3000"
  otel:
    url: "http://otel-collector:4318"
    health_url: "http://otel-collector:13133"
    zpages_url: "http://otel-collector:55679"
  health_check:
    url: "http://health-check:8000"

# Deployment tooling
deployment:
  file_manager:
    allowed_extensions: [".md", ".py", ".js", ".html", ".css", ".json", ".yaml", ".yml"]
    max_file_size: 10485760
  docker:
    network_name: "squad-ops_squadnet"
    default_port: 8080
    restart_policy: "unless-stopped"
  warm_boot_dir: "/app/warm-boot"

