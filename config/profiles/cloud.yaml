# SIP-0063: Cloud (AWS/GCP/Azure) deployment profile
auth:
  enabled: true
  provider: keycloak
  roles_mode: client
  roles_client_id: squadops-runtime
  keycloak:
    realm: squadops-cloud
    base_url: "http://squadops-keycloak:8080"
    public_url: "https://auth.squadops.example"
    db_dsn: "secret://keycloak_db_dsn"
    proxy_mode: edge
    external_tls_termination: true
    hostname_strict: true
    admin:
      username: admin
      password: "secret://keycloak_admin_password"
      allowed_networks: ["10.0.0.0/8"]
    token_policy:
      access_token_minutes: 5
      refresh_token_minutes: 1440
      refresh_token_rotation: true
    session_policy:
      idle_minutes: 30
      max_minutes: 480
    security:
      mfa_required_for_admin: true
      mfa_required_for_operator: true
      brute_force_protection: true
    logging:
      admin_events_enabled: true
      login_events_enabled: true
