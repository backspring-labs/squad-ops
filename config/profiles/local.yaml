# Local Development Profile
# Developer-friendly defaults for local development

secrets:
  provider: env
  env_prefix: SQUADOPS_

db:
  url: "postgresql://squadops:secret://db_password@localhost:5432/squadops"
  pool_size: 5
  echo: false

comms:
  rabbitmq:
    url: "amqp://squadops:secret://rabbitmq_password@localhost:5672/"
    host: "localhost"
    port: 5672
    user: "squadops"
  redis:
    url: "redis://localhost:6379/0"
    host: "localhost"
    port: 6379

runtime_api_url: "http://localhost:8001"

llm:
  url: "http://localhost:11434"
  use_local: true

cycle_data:
  root: "cycle_data"

observability:
  prometheus:
    url: "http://localhost:9090"
  grafana:
    url: "http://localhost:3000"
  otel:
    url: "http://localhost:4318"
    health_url: "http://localhost:13133"
    zpages_url: "http://localhost:55679"

