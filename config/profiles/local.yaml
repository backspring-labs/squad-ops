# SIP-0063: Local development deployment profile
auth:
  enabled: true
  provider: keycloak
  roles_mode: realm
  keycloak:
    realm: squadops-local
    base_url: "http://localhost:8180"
    proxy_mode: "none"
    hostname_strict: false
    admin:
      username: admin
      password: "secret://keycloak_admin_password"
    security:
      mfa_required_for_admin: false
      mfa_required_for_operator: false
