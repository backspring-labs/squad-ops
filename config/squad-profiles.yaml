profiles:
  - profile_id: smoke
    name: "Smoke Squad"
    description: "All 5 agents on qwen2.5:3b-instruct — minimal liveness/plumbing squad for hello_squad / selftest cycles only. No builder (dev does assembly). NOT a reasoning-quality signal."
    version: 1
    agents:
      - { agent_id: max, role: lead, model: "qwen2.5:3b-instruct", enabled: true }
      - { agent_id: neo, role: dev, model: "qwen2.5:3b-instruct", enabled: true }
      - { agent_id: nat, role: strat, model: "qwen2.5:3b-instruct", enabled: true }
      - { agent_id: eve, role: qa, model: "qwen2.5:3b-instruct", enabled: true }
      - { agent_id: data, role: data, model: "qwen2.5:3b-instruct", enabled: true }

  - profile_id: lite
    name: "Lite Squad"
    description: "All 6 roles incl. builder on qwen2.5:7b — lightweight end-to-end framework validation. Exercises the full build path (incl. builder.assemble) cheaply; small but structured-output-capable. For plumbing/clean-framework checks, NOT reasoning-quality signal."
    version: 1
    agents:
      - { agent_id: max, role: lead, model: "qwen2.5:7b", enabled: true }
      - { agent_id: neo, role: dev, model: "qwen2.5:7b", enabled: true }
      - { agent_id: nat, role: strat, model: "qwen2.5:7b", enabled: true }
      - { agent_id: bob, role: builder, model: "qwen2.5:7b", enabled: true }
      - { agent_id: eve, role: qa, model: "qwen2.5:7b", enabled: true }
      - { agent_id: data, role: data, model: "qwen2.5:7b", enabled: true }

  - profile_id: full
    name: "Full Squad"
    description: "All 6 roles incl. builder on qwen3.6:27b — uniform single-loaded model on Spark (no swap overhead), max reasoning depth at the ~16 tps ceiling. The quality squad. (Consolidates the former full-squad + spark-squad-with-builder; #173.)"
    version: 5
    agents:
      - { agent_id: max, role: lead, model: "qwen3.6:27b", enabled: true }
      - { agent_id: neo, role: dev, model: "qwen3.6:27b", enabled: true }
      - { agent_id: nat, role: strat, model: "qwen3.6:27b", enabled: true }
      - { agent_id: bob, role: builder, model: "qwen3.6:27b", enabled: true }
      - { agent_id: eve, role: qa, model: "qwen3.6:27b", enabled: true }
      - { agent_id: data, role: data, model: "qwen3.6:27b", enabled: true }

# Default when a cycle is created without an explicit --squad-profile. Points at the
# always-runnable 'smoke' tier so an unspecified cycle never hard-fails on a missing
# model (the former 'full-squad' default was the #173 footgun). Real cycles pass
# --squad-profile explicitly; the model-availability preflight (#224) guards the rest.
active_profile: smoke
