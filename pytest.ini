[pytest]
# Pytest configuration for SquadOps test harness

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Python path configuration
# Note: _v0_legacy added for agents.* imports from legacy code
pythonpath = . src _v0_legacy

# Async support
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    regression: Regression tests for critical workflows
    performance: Performance and load tests
    slow: Slow running tests
    database: Tests that require database
    rabbitmq: Tests that require RabbitMQ
    redis: Tests that require Redis
    asyncio: Async tests using pytest-asyncio
    langfuse: Tests requiring a live LangFuse instance (SIP-0061)
    domain_agents: Agent domain tests
    domain_capabilities: Capability domain tests
    domain_api: API domain tests
    domain_memory: Memory domain tests
    smoke: Quick validation tests
    docker: Tests requiring Docker
    auth: Tests that exercise authentication/authorization logic

# Test execution
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10

# Coverage configuration
[coverage:run]
source = agents
include = 
    agents/*
    config/*
    infra/runtime-api/*  # SIP-0048: renamed from task-api
    infra/health-check/*
omit = 
    */tests/*
    */venv/*
    */env/*
    */__pycache__/*
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = tests/htmlcov
