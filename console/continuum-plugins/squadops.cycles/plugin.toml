[plugin]
id = "squadops.cycles"
name = "Cycles"
version = "0.1.0"
description = "Cycle lifecycle management — create, monitor, gate decisions."
required = false

[plugin.ui]
tag_prefix = "squadops-cycles"
bundle = "plugin.js"

[[contributions.nav]]
slot = "ui.slot.left_nav"
label = "Cycles"
icon = "clock"
priority = 800

[contributions.nav.target]
type = "panel"
panel_id = "cycles"

[[contributions.panel]]
slot = "ui.slot.main"
perspective = "cycles"
component = "squadops-cycles-list"
priority = 800

[[contributions.panel]]
slot = "ui.slot.main"
perspective = "cycles"
component = "squadops-cycles-run-timeline"
priority = 700

[[contributions.panel]]
slot = "ui.slot.main"
perspective = "cycles"
component = "squadops-cycles-run-detail"
priority = 600

[[contributions.command]]
id = "squadops.create_cycle"
label = "Create Cycle"
action = "squadops.create_cycle"
danger_level = "safe"

[[contributions.command]]
id = "squadops.create_run"
label = "Create Run"
action = "squadops.create_run"
danger_level = "safe"

[[contributions.command]]
id = "squadops.cancel_cycle"
label = "Cancel Cycle"
action = "squadops.cancel_cycle"
danger_level = "confirm"

[[contributions.command]]
id = "squadops.cancel_run"
label = "Cancel Run"
action = "squadops.cancel_run"
danger_level = "confirm"

[[contributions.command]]
id = "squadops.gate_approve"
label = "Approve Gate"
action = "squadops.gate_approve"
danger_level = "safe"

[[contributions.command]]
id = "squadops.gate_reject"
label = "Reject Gate"
action = "squadops.gate_reject"
danger_level = "confirm"
