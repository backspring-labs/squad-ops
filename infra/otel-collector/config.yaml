receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  resource:
    attributes:
      - key: service.name
        action: insert
        value: squadops

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: squadops
  debug:
    verbosity: normal
  # Optional: Add OTLP exporter for Jaeger if needed
  # otlp/jaeger:
  #   endpoint: jaeger:4317

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    include_metadata: true  # Include version and other metadata in health check response
  zpages:
    endpoint: 0.0.0.0:55679  # Diagnostic pages extension (includes version info)

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug]

