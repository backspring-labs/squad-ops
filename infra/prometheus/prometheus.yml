global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'squadops-dev'
    environment: 'development'

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape agents (Prometheus exporter endpoints)
  - job_name: 'squadops-agents'
    static_configs:
      - targets:
          - 'max:8888'
          - 'neo:8888'
          - 'task-api:8888'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Scrape OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets:
          - 'otel-collector:8889'
    metrics_path: '/metrics'
    scrape_interval: 15s

